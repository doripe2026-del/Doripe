name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test landing motion
        run: npm run test:landing-motion

      - name: Check landing motion contracts
        run: npm run check:landing-motion

      - name: Typecheck
        run: npm run typecheck

      - name: Build admin bundle
        run: npm run build:admin

      - name: Check MVP app contract
        run: npm run check:mvp-app

      - name: Test deployment readiness rules
        run: npm run test:ops

      - name: Test app data and state
        run: npm run test:app-preview:unit

      - name: Test backend and public boundaries
        run: npm run test:backend && npm run test:server-boundaries

      - name: Check API contract
        run: npm run check:api-contract

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Test complete MVP behavior
        run: npm run test:app-preview:e2e:ci

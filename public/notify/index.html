  '&': '&amp;',
  '<': '&lt;',
  '>': '&gt;',
  '"': '&quot;',
  "'": '&#39;',
}[ch]));

const betaCommitmentLevels = ['알림', '가볍게', '적극적', '피드백'];
const OTHER_OPTION = '기타';

function isArrayField(key) {
  return Array.isArray(state[key]);
}

function phoneDigits(value) {
  return String(value || '').replace(/\D/g, '');
}

function phoneOk(value) {
  return /^01[016789]\d{7,8}$/.test(phoneDigits(value));
}

function toggleValue(key, value, multi) {
  if (multi) {
    state[key] = state[key].includes(value)
      ? state[key].filter((item) => item !== value)
      : [...state[key], value];
  } else {
    state[key] = value;
  }
}

function isOtherSelected(field) {
  const value = state[field.key];
  return field.allowOther && (Array.isArray(value) ? value.includes(OTHER_OPTION) : value === OTHER_OPTION);
}

function otherAnswer(key) {
  return String(state.otherAnswers?.[key] || '').trim();
}

function serializeSingle(key) {
  return state[key] === OTHER_OPTION ? `기타: ${otherAnswer(key)}` : state[key];
}

function serializeArray(key) {
  return state[key].map((item) => item === OTHER_OPTION ? `기타: ${otherAnswer(key)}` : item);
}

function optionLabelHtml(key, option, index) {
  const level = betaCommitmentLevels[index];
  if (key !== 'betaCommitment' || !level) {
    return escapeHtml(option);
  }
  return `
    <span class="flex flex-wrap items-center justify-center gap-2">
      <span class="intent-level">${escapeHtml(level)}</span>
      <span>${escapeHtml(option)}</span>
    </span>
  `;
}

function renderChips(field) {
  const multi = field.type === 'multi';
  const showOtherInput = isOtherSelected(field);

    <div class="field-block field-${escapeHtml(field.key)}">
      <p class="text-sm font-black text-ink">${escapeHtml(field.label)}</p>
      <div class="options-grid options-${escapeHtml(field.key)} mt-4 grid grid-cols-1 gap-2">

          const active = multi ? state[field.key].includes(option) : state[field.key] === option;
          return `<button type="button" class="chip ${active ? 'active' : ''}" data-key="${escapeHtml(field.key)}" data-value="${escapeHtml(option)}" data-multi="${multi ? '1' : '0'}">${optionLabelHtml(field.key, option, optionIndex)}</button>`;

      </div>
      ${field.allowOther ? `
        <div class="other-panel ${showOtherInput ? '' : 'hidden'}">

      ` : ''}
    </div>
  `;
}

        <label class="consent-row">
          <input type="checkbox" data-consent="consentMarketing" ${state.consentMarketing ? 'checked' : ''} />
          <span class="text-xs leading-relaxed text-muted"><strong>[선택]</strong> 베타 소식과 이벤트 안내를 문자 또는 전화로 받겠습니다.</span>
        </label>
        <label class="consent-row">
          <input type="checkbox" data-consent="consentAnalytics" ${state.consentAnalytics ? 'checked' : ''} />
          <span class="text-xs leading-relaxed text-muted"><strong>[선택]</strong> 응답 데이터를 비식별 통계로 활용하는 것에 동의합니다.</span>
        </label>
      </div>
    </div>
  `;
}

function renderProgressDots() {
  progressDots.innerHTML = steps.map((_, index) => `<span class="progress-dot ${index <= step ? 'active' : ''}"></span>`).join('');
}

function render() {
  const current = steps[step];
  document.querySelector('.notify-shell')?.classList.toggle('is-final-step', current.fields[0]?.type === 'final');
  headline.textContent = current.title;
  subcopy.textContent = current.desc;
  sectionLabel.textContent = `Step ${step + 1}`;
  introHeadline.textContent = current.title;
  introSubcopy.textContent = current.desc;
  introSectionLabel.textContent = `Step ${step + 1}`;
  stepCount.textContent = `${step + 1}/${steps.length}`;
  timeHint.textContent = progressMessages[step] || progressMessages[progressMessages.length - 1];
  progress.style.width = `${((step + 1) / steps.length) * 100}%`;
  nextButtons.forEach((button) => { button.textContent = step === steps.length - 1 ? '신청 완료' : '다음'; });
  errorMsg.classList.add('hidden');
  formCard.classList.remove('step-in');
  void formCard.offsetWidth;
  formCard.classList.add('step-in');
  formCard.innerHTML = current.fields.map((field) => field.type === 'final' ? renderFinal() : renderChips(field)).join('<div class="my-6 border-t border-black/10"></div>');
  renderProgressDots();
  attachHandlers();
  updateNext();
}

function attachHandlers() {
  formCard.querySelectorAll('.chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      toggleValue(chip.dataset.key, chip.dataset.value, chip.dataset.multi === '1');
      render();
    });
  });
  const opinion = document.getElementById('opinion');
  if (opinion) opinion.addEventListener('input', (e) => { state.opinion = e.target.value; });
  const phone = document.getElementById('phone');
  if (phone) phone.addEventListener('input', (e) => { state.phone = e.target.value; updateNext(); });
  formCard.querySelectorAll('[data-other-key]').forEach((input) => {
    input.addEventListener('input', (e) => {
      state.otherAnswers[e.target.dataset.otherKey] = e.target.value;
      updateNext();
    });
  });
  formCard.querySelectorAll('[data-consent]').forEach((box) => {
    box.addEventListener('change', () => {
      state[box.dataset.consent] = box.checked;
      syncConsentAll();
      updateNext();
    });
  });
  const consentAll = document.getElementById('consentAll');
  if (consentAll) {
    syncConsentAll();
    consentAll.addEventListener('change', () => {
      ['consentPrivacy','consentTerms','consentAge','consentMarketing','consentAnalytics'].forEach((key) => { state[key] = consentAll.checked; });
      render();
    });
  }
}

function syncConsentAll() {
  const consentAll = document.getElementById('consentAll');
  if (consentAll) consentAll.checked = state.consentPrivacy && state.consentTerms && state.consentAge && state.consentMarketing && state.consentAnalytics;
}

function canProceed() {
  const current = steps[step];
  if (current.fields[0]?.type === 'final') {
    return phoneOk(state.phone) && state.consentPrivacy && state.consentTerms && state.consentAge;
  }
  return current.fields.every((field) => {
    const value = state[field.key];
    const hasSelection = isArrayField(field.key) ? value.length > 0 : !!value;
    const hasRequiredOtherText = !isOtherSelected(field) || otherAnswer(field.key).length > 0;
    return hasSelection && hasRequiredOtherText;
  });
}

function updateNext() {
  const disabled = !canProceed();
  nextButtons.forEach((button) => { button.disabled = disabled; });
}

function track(type, completedStep) {
  fetch('/api/track-v2', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type, route:'/notify', ...(completedStep ? { step: completedStep } : {}), ...(campaignCode ? { campaignCode } : {}) }),
    keepalive:true,
  }).catch(()=>{});
}

async function submit() {
  nextButtons.forEach((button) => {
    button.disabled = true;
    button.textContent = '제출 중...';
  });
  errorMsg.classList.add('hidden');
  const payload = {
    age: state.age,
    gender: state.gender,
    region: state.region,
    painPoint: serializeSingle('painPoint'),
    desiredFeatures: serializeArray('desiredFeatures'),
    useCases: [],
    recentSearchMethods: serializeArray('recentSearchMethods'),
    saveLocations: serializeArray('saveLocations'),
    betaResult: serializeSingle('betaResult'),
    betaCommitment: serializeSingle('betaCommitment'),
    opinion: state.opinion,
    phone: state.phone,
    consentPrivacy: state.consentPrivacy,
    consentTerms: state.consentTerms,
    consentAge: state.consentAge,
    consentMarketing: state.consentMarketing,
    consentAnalytics: state.consentAnalytics,
    campaignCode: campaignCode || null,
  };
  try {
    const res = await fetch('/api/notify-v2', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const body = await res.json().catch(()=>({}));
    if (!res.ok || !body.ok) throw new Error(body.error || '제출에 실패했습니다.');
    document.getElementById('thankyou').classList.add('show');
  } catch (e) {
    errorMsg.textContent = e.message || '잠시 후 다시 시도해주세요.';
    errorMsg.classList.remove('hidden');
    nextButtons.forEach((button) => {
      button.disabled = false;
      button.textContent = '신청 완료';
    });
  }
}

function handleNext() {
  if (!canProceed()) return;
  if (step < steps.length - 1) {
    track('step_complete', step + 1);
    step += 1;
    render();
    window.scrollTo({ top:0, behavior:'smooth' });
  } else {
    submit();
  }
}

nextButtons.forEach((button) => button.addEventListener('click', handleNext));

backBtn.addEventListener('click', () => {
  if (step === 0) {
    location.href = '/';
    return;
  }
  step -= 1;
  render();
  window.scrollTo({ top:0, behavior:'smooth' });
});

track('page_view');
render();
</script>
</body>
</html>

      "Withdrawal": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["confirmation"], "properties": { "confirmation": { "type": "string", "const": "WITHDRAW" }, "reasonCode": { "type": "string", "enum": ["not_useful", "privacy", "duplicate", "other"] } } } } } },
      "SavePut": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "properties": { "sourceContentId": { "type": ["string", "null"], "format": "uuid" }, "sourceScreen": { "type": ["string", "null"], "maxLength": 80 } } } } } },
      "CourseCreate": { "description": "startPlaceId is required and must also occur in placeIds.", "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["name", "visibility", "startPlaceId", "placeIds"], "properties": { "name": { "type": "string", "minLength": 1, "maxLength": 120 }, "visibility": { "type": "string", "enum": ["private", "public"] }, "startPlaceId": { "$ref": "#/components/schemas/SafeId" }, "placeIds": { "type": "array", "minItems": 2, "maxItems": 30, "uniqueItems": true, "items": { "$ref": "#/components/schemas/SafeId" } } } } } } },
      "CourseUpdate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["expectedVersion", "placeIds"], "properties": { "name": { "type": "string", "minLength": 1, "maxLength": 120 }, "visibility": { "type": "string", "enum": ["private", "public"] }, "placeIds": { "type": "array", "minItems": 2, "maxItems": 30, "uniqueItems": true, "items": { "$ref": "#/components/schemas/SafeId" } }, "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "CoursePlaceCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["placeId", "expectedVersion"], "properties": { "placeId": { "$ref": "#/components/schemas/SafeId" }, "position": { "type": "integer", "minimum": 0, "maximum": 99 }, "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "CoursePlaceUpdate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["expectedVersion"], "minProperties": 2, "properties": { "stayMinutes": { "type": ["integer", "null"], "minimum": 0, "maximum": 1440 }, "note": { "type": "string", "maxLength": 500 }, "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "CoursePlaceReplace": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["newPlaceId", "reason", "expectedVersion"], "properties": { "newPlaceId": { "$ref": "#/components/schemas/SafeId" }, "reason": { "type": "string", "minLength": 1, "maxLength": 500 }, "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "CommentCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["text"], "properties": { "text": { "type": "string", "minLength": 1, "maxLength": 1000 } } } } } },
      "CommentUpdate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["text", "expectedVersion"], "properties": { "text": { "type": "string", "minLength": 1, "maxLength": 1000 }, "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "ContentCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["type", "caption", "placeIds"], "properties": { "type": { "type": "string", "enum": ["place", "course"] }, "caption": { "type": "string", "maxLength": 2000 }, "placeIds": { "type": "array", "minItems": 1, "maxItems": 30, "uniqueItems": true, "items": { "$ref": "#/components/schemas/SafeId" } }, "courseId": { "type": ["string", "null"], "format": "uuid" } } } } } },
      "ContentUpdate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["expectedVersion"], "properties": { "caption": { "type": "string", "maxLength": 2000 }, "placeIds": { "type": "array", "minItems": 1, "maxItems": 30, "uniqueItems": true, "items": { "$ref": "#/components/schemas/SafeId" } }, "courseId": { "type": ["string", "null"], "format": "uuid" }, "mediaIds": { "type": "array", "maxItems": 5, "uniqueItems": true, "items": { "$ref": "#/components/schemas/Uuid" } }, "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "ContentSubmit": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["expectedVersion"], "properties": { "expectedVersion": { "type": "integer", "minimum": 1 } } } } } },
      "MediaUploadCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["kind", "mimeType", "fileName", "byteSize", "checksumSha256"], "properties": { "kind": { "type": "string", "enum": ["image", "video"] }, "mimeType": { "type": "string", "maxLength": 100 }, "fileName": { "type": "string", "minLength": 1, "maxLength": 180 }, "byteSize": { "type": "integer", "minimum": 1 }, "durationSeconds": { "type": ["number", "null"], "minimum": 0 }, "checksumSha256": { "type": "string", "pattern": "^[a-f0-9]{64}$" }, "sourceType": { "type": "string", "enum": ["user", "curator", "partner"] } } } } } },
      "MediaComplete": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["storagePath", "byteSize", "checksumSha256"], "properties": { "storagePath": { "type": "string", "minLength": 1, "maxLength": 500 }, "byteSize": { "type": "integer", "minimum": 1 }, "checksumSha256": { "type": "string", "pattern": "^[a-f0-9]{64}$" } } } } } },
      "InquiryCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["category", "text"], "properties": { "category": { "type": "string", "enum": ["bug", "feedback", "account", "content", "other"] }, "text": { "type": "string", "minLength": 1, "maxLength": 5000 } } } } } },
      "ReportCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["targetType", "targetId", "reasonCode"], "properties": { "targetType": { "type": "string", "enum": ["user", "place", "content"] }, "targetId": { "type": "string", "minLength": 1, "maxLength": 96 }, "reasonCode": { "type": "string", "enum": ["spam", "abuse", "rights", "incorrect", "unsafe", "other"] }, "details": { "type": "string", "maxLength": 2000 } } } } } },
      "ShareCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["targetType", "targetId", "regionId"], "properties": { "targetType": { "type": "string", "enum": ["place", "course"] }, "targetId": { "type": "string", "minLength": 1, "maxLength": 96 }, "regionId": { "$ref": "#/components/schemas/SafeId" } } } } } },
      "ShareRevoke": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["reason"], "properties": { "reason": { "type": "string", "minLength": 1, "maxLength": 500 } } } } } },
      "SessionCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["sessionId", "anonymousId", "startedAt", "entryPath"], "properties": { "sessionId": { "$ref": "#/components/schemas/Uuid" }, "anonymousId": { "type": "string", "minLength": 16, "maxLength": 96 }, "startedAt": { "$ref": "#/components/schemas/Timestamp" }, "entryPath": { "type": "string", "minLength": 1, "maxLength": 300 }, "campaignCode": { "type": ["string", "null"], "maxLength": 40 } } } } } },
      "EventBatch": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["events"], "properties": { "events": { "type": "array", "minItems": 1, "maxItems": 50, "items": { "$ref": "#/components/schemas/EventInput" } } } } } } },
      "AdminTransition": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["status", "reason", "expectedVersion"], "properties": { "status": { "type": "string", "pattern": "^[a-z][a-z0-9_]*$", "maxLength": 40 }, "reason": { "type": "string", "minLength": 1, "maxLength": 1000 }, "expectedVersion": { "type": "integer", "minimum": 1 }, "note": { "type": "string", "maxLength": 2000 } } } } } },
      "AdminPlaceCreate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["id", "name", "categoryId", "neighborhoodId", "address", "latitude", "longitude", "reason"], "properties": { "id": { "$ref": "#/components/schemas/SafeId" }, "name": { "type": "string", "minLength": 1, "maxLength": 120 }, "categoryId": { "$ref": "#/components/schemas/SafeId" }, "neighborhoodId": { "$ref": "#/components/schemas/SafeId" }, "address": { "type": "string", "maxLength": 300 }, "latitude": { "type": "number", "minimum": -90, "maximum": 90 }, "longitude": { "type": "number", "minimum": -180, "maximum": 180 }, "reason": { "type": "string", "minLength": 1, "maxLength": 1000 } } } } } },
      "AdminPlaceUpdate": { "required": true, "content": { "application/json": { "schema": { "type": "object", "additionalProperties": false, "required": ["expectedVersion", "reason"], "minProperties": 3, "properties": { "name": { "type": "string", "minLength": 1, "maxLength": 120 }, "shortCopy": { "type": "string", "maxLength": 300 }, "categoryId": { "$ref": "#/components/schemas/SafeId" }, "neighborhoodId": { "$ref": "#/components/schemas/SafeId" }, "address": { "type": "string", "maxLength": 300 }, "latitude": { "type": "number", "minimum": -90, "maximum": 90 }, "longitude": { "type": "number", "minimum": -180, "maximum": 180 }, "nearestStation": { "type": "string", "maxLength": 200 }, "hoursText": { "type": "string", "maxLength": 300 }, "phoneText": { "type": "string", "maxLength": 100 }, "moodTags": { "type": "array", "maxItems": 30, "items": { "type": "string", "minLength": 1, "maxLength": 80 } }, "bestFor": { "type": "array", "maxItems": 30, "items": { "type": "string", "minLength": 1, "maxLength": 80 } }, "timeTags": { "type": "array", "maxItems": 30, "items": { "type": "string", "minLength": 1, "maxLength": 80 } }, "priceLevel": { "type": "string", "maxLength": 80 }, "representativeMenuName": { "type": "string", "maxLength": 160 }, "representativeMenuPrice": { "type": "string", "maxLength": 80 }, "stayTimeMinutes": { "type": "integer", "minimum": 0, "maximum": 1440 }, "externalMapUrl": { "type": "string", "format": "uri", "pattern": "^https://(?:(?:[A-Za-z0-9-]+\\.)*(?:map|place)\\.naver\\.com|naver\\.me)(?:/|$)", "maxLength": 1000 }, "status": { "type": "string", "pattern": "^[a-z][a-z0-9_]*$", "maxLength": 40 }, "expectedVersion": { "type": "integer", "minimum": 1 }, "reason": { "type": "string", "minLength": 1, "maxLength": 1000 } } } } } },

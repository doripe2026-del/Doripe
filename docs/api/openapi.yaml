{
  "openapi": "3.1.0",
  "info": {
    "title": "Doripe Backend API v1",
    "version": "1.0.0-draft",
    "description": "Frontend-first contract for Doripe app, public web, and operator workflows. This file is JSON-compatible YAML and contains no credentials."
  },
  "servers": [
    {
      "url": "/api/v1",
      "description": "Same-origin Doripe API"
    }
  ],
  "tags": [
    { "name": "Auth" },
    { "name": "System" },
    { "name": "Discovery" },
    { "name": "Account" },
    { "name": "Saves" },
    { "name": "Courses" },
    { "name": "Social" },
    { "name": "Content" },
    { "name": "Media" },
    { "name": "Support" },
    { "name": "Analytics" },
    { "name": "Forms" },
    { "name": "Admin" }
  ],
  "paths": {
    "/auth/config": {
      "get": {
        "tags": ["Auth"],
        "operationId": "getAuthConfig",
        "summary": "Return browser-safe Supabase Auth configuration",
        "x-auth-class": "public",
        "x-operator-scope": "none",
        "x-idempotency": { "mode": "none" },
        "x-pagination": { "mode": "none" },
        "security": [],
        "responses": {
          "200": { "$ref": "#/components/responses/AuthConfig" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/health": {
      "get": {
        "tags": ["System"],
        "operationId": "getHealth",
        "summary": "Return process liveness without checking dependencies",
        "x-auth-class": "public",
        "x-operator-scope": "none",
        "x-idempotency": { "mode": "none" },
        "x-pagination": { "mode": "none" },
        "security": [],
        "responses": {
          "200": { "$ref": "#/components/responses/Health" }
        }
      }
    },
    "/readiness": {
      "get": {
        "tags": ["System"],
        "operationId": "getReadiness",
        "summary": "Return dependency and production-adapter readiness without secret values",
        "x-auth-class": "public",
        "x-operator-scope": "none",
        "x-idempotency": { "mode": "none" },
        "x-pagination": { "mode": "none" },
        "security": [],
        "responses": {
          "200": { "$ref": "#/components/responses/Readiness" },
          "503": { "$ref": "#/components/responses/ServiceUnavailable" }
        }
      }
    },
    "/bootstrap": {
      "get": {
        "tags": ["System"],
        "operationId": "getBootstrap",
        "summary": "Return public taxonomy, regions, feature flags, and contract versions",
        "x-auth-class": "public",
        "x-operator-scope": "none",
        "x-idempotency": { "mode": "none" },
        "x-pagination": { "mode": "none" },
        "security": [],
        "responses": {
          "200": { "$ref": "#/components/responses/Bootstrap" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/feed": {
      "get": {
        "tags": ["Discovery"],
        "operationId": "listFeed",
        "summary": "List published content in deterministic cursor order",
        "description": "scope=discover is public with optional user context. scope=following requires a valid user token. centerLat, centerLng, and radiusKm must be sent all three together; when omitted, the feed covers all Seoul.",
        "x-auth-class": "optional_user",
        "x-operator-scope": "none",
        "x-idempotency": { "mode": "none" },
        "x-pagination": { "mode": "cursor", "stableSort": ["published_at:desc", "id:desc"] },
        "security": [{}, { "userBearer": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/Limit" },
          { "$ref": "#/components/parameters/Cursor" },
          { "name": "scope", "in": "query", "required": false, "schema": { "type": "string", "enum": ["discover", "following"], "default": "discover" } },
          { "name": "regionId", "in": "query", "required": false, "schema": { "$ref": "#/components/schemas/SafeId" } },
          { "name": "categoryId", "in": "query", "required": false, "schema": { "$ref": "#/components/schemas/SafeId" } },
          { "name": "tagIds", "in": "query", "required": false, "schema": { "type": "array", "maxItems": 20, "items": { "$ref": "#/components/schemas/SafeId" } }, "style": "form", "explode": false },
          { "name": "centerLat", "in": "query", "required": false, "description": "Latitude of the selected map pin. Send with centerLng and radiusKm.", "schema": { "type": "number", "minimum": -90, "maximum": 90 } },
          { "name": "centerLng", "in": "query", "required": false, "description": "Longitude of the selected map pin. Send with centerLat and radiusKm.", "schema": { "type": "number", "minimum": -180, "maximum": 180 } },
          { "name": "radiusKm", "in": "query", "required": false, "description": "Radius around the selected map pin in kilometers. Send with centerLat and centerLng.", "schema": { "type": "number", "exclusiveMinimum": 0, "maximum": 50 } }
        ],
        "responses": {
          "200": { "$ref": "#/components/responses/ContentList" },
          "400": { "$ref": "#/components/responses/BadRequest" },
          "401": { "$ref": "#/components/responses/Unauthorized" },
          "403": { "$ref": "#/components/responses/Forbidden" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/places/{id}": {
      "get": {
        "tags": ["Discovery"], "operationId": "getPlace", "summary": "Get a published place",
        "x-auth-class": "public", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [],
        "parameters": [{ "$ref": "#/components/parameters/Id" }],
        "responses": { "200": { "$ref": "#/components/responses/Place" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/places/{id}/contents": {
      "get": {
        "tags": ["Discovery"], "operationId": "listPlaceContents", "summary": "List published content for a place",
        "x-auth-class": "public", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "cursor", "stableSort": ["published_at:desc", "id:desc"] }, "security": [],
        "parameters": [{ "$ref": "#/components/parameters/Id" }, { "$ref": "#/components/parameters/Limit" }, { "$ref": "#/components/parameters/Cursor" }],
        "responses": { "200": { "$ref": "#/components/responses/ContentList" }, "400": { "$ref": "#/components/responses/BadRequest" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/places/{id}/related": {
      "get": {
        "tags": ["Discovery"], "operationId": "listRelatedPlaces", "summary": "List related published places",
        "x-auth-class": "public", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "cursor", "stableSort": ["updated_at:desc", "id:desc"] }, "security": [],
        "parameters": [{ "$ref": "#/components/parameters/Id" }, { "$ref": "#/components/parameters/Limit" }, { "$ref": "#/components/parameters/Cursor" }],
        "responses": { "200": { "$ref": "#/components/responses/PlaceList" }, "400": { "$ref": "#/components/responses/BadRequest" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/contents/{id}": {
      "get": {
        "tags": ["Discovery"], "operationId": "getContent", "summary": "Get published content or an owner's own draft",
        "x-auth-class": "optional_user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{}, { "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/Id" }],
        "responses": { "200": { "$ref": "#/components/responses/Content" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "patch": {
        "tags": ["Content"], "operationId": "updateContent", "summary": "Update an owned draft or rejected content item",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/Id" }],
        "requestBody": { "$ref": "#/components/requestBodies/ContentUpdate" },
        "responses": { "200": { "$ref": "#/components/responses/Content" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "403": { "$ref": "#/components/responses/Forbidden" }, "404": { "$ref": "#/components/responses/NotFound" }, "409": { "$ref": "#/components/responses/Conflict" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/profiles/{id}": {
      "get": {
        "tags": ["Discovery"], "operationId": "getPublicProfile", "summary": "Get a public profile without private account fields",
        "x-auth-class": "public", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }],
        "responses": { "200": { "$ref": "#/components/responses/Profile" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/profiles/{id}/contents": {
      "get": {
        "tags": ["Discovery"], "operationId": "listProfileContents", "summary": "List a profile's published content",
        "x-auth-class": "public", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "cursor", "stableSort": ["published_at:desc", "id:desc"] }, "security": [],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }, { "$ref": "#/components/parameters/Limit" }, { "$ref": "#/components/parameters/Cursor" }],
        "responses": { "200": { "$ref": "#/components/responses/ContentList" }, "400": { "$ref": "#/components/responses/BadRequest" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/courses/{id}": {
      "get": {
        "tags": ["Courses"], "operationId": "getCourse", "summary": "Get a public course or an owner's private course",
        "x-auth-class": "optional_user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{}, { "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }],
        "responses": { "200": { "$ref": "#/components/responses/Course" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "patch": {
        "tags": ["Courses"], "operationId": "updateCourse", "summary": "Atomically update an owned course and complete place order",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }], "requestBody": { "$ref": "#/components/requestBodies/CourseUpdate" },
        "responses": { "200": { "$ref": "#/components/responses/Course" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "409": { "$ref": "#/components/responses/Conflict" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "delete": {
        "tags": ["Courses"], "operationId": "deleteCourse", "summary": "Hide an owned course",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "natural_resource" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }],
        "responses": { "200": { "$ref": "#/components/responses/Mutation" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "409": { "$ref": "#/components/responses/Conflict" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/shares/{slug}": {
      "get": {
        "tags": ["Discovery"], "operationId": "resolveShare", "summary": "Resolve a valid, nonexpired, nonrevoked public share",
        "x-auth-class": "public", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [],
        "parameters": [{ "$ref": "#/components/parameters/Slug" }],
        "responses": { "200": { "$ref": "#/components/responses/Share" }, "404": { "$ref": "#/components/responses/NotFound" }, "410": { "$ref": "#/components/responses/Gone" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/profile": {
      "get": {
        "tags": ["Account"], "operationId": "getMyProfile", "summary": "Get the authenticated user's public profile",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "responses": { "200": { "$ref": "#/components/responses/Profile" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "403": { "$ref": "#/components/responses/Forbidden" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "patch": {
        "tags": ["Account"], "operationId": "updateMyProfile", "summary": "Update nickname, introduction, or profile image",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "requestBody": { "$ref": "#/components/requestBodies/ProfileUpdate" },
        "responses": { "200": { "$ref": "#/components/responses/Profile" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "403": { "$ref": "#/components/responses/Forbidden" }, "409": { "$ref": "#/components/responses/Conflict" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/account": {
      "get": {
        "tags": ["Account"], "operationId": "getMyAccount", "summary": "Get account, verification, and application state without tokens",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "responses": { "200": { "$ref": "#/components/responses/Account" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "403": { "$ref": "#/components/responses/Forbidden" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/onboarding": {
      "put": {
        "tags": ["Account"], "operationId": "putMyOnboarding", "summary": "Create or replace onboarding preferences",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "natural_resource" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "requestBody": { "$ref": "#/components/requestBodies/OnboardingPut" },
        "responses": { "200": { "$ref": "#/components/responses/Mutation" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "403": { "$ref": "#/components/responses/Forbidden" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/notifications": {
      "get": {
        "tags": ["Account"], "operationId": "getMyNotifications", "summary": "Get notification preferences",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "responses": { "200": { "$ref": "#/components/responses/NotificationPreferences" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "put": {
        "tags": ["Account"], "operationId": "putMyNotifications", "summary": "Replace notification preferences",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "natural_resource" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "requestBody": { "$ref": "#/components/requestBodies/NotificationPut" },
        "responses": { "200": { "$ref": "#/components/responses/NotificationPreferences" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/withdrawal": {
      "post": {
        "tags": ["Account"], "operationId": "requestMyWithdrawal", "summary": "Request account withdrawal without inventing retention rules",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "header_required" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/IdempotencyKey" }], "requestBody": { "$ref": "#/components/requestBodies/Withdrawal" },
        "responses": { "202": { "$ref": "#/components/responses/Mutation" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "409": { "$ref": "#/components/responses/Conflict" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/saves": {
      "get": {
        "tags": ["Saves"], "operationId": "listMySaves", "summary": "List the authenticated user's saved places and courses",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "cursor", "stableSort": ["saved_at:desc", "target_id:desc"] }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/Limit" }, { "$ref": "#/components/parameters/Cursor" }, { "name": "targetType", "in": "query", "required": false, "schema": { "type": "string", "enum": ["place", "course"] } }],
        "responses": { "200": { "$ref": "#/components/responses/SaveList" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/me/saves/{targetType}/{targetId}": {
      "put": {
        "tags": ["Saves"], "operationId": "putMySave", "summary": "Idempotently save a place or course",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "natural_resource" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/TargetType" }, { "$ref": "#/components/parameters/TargetId" }], "requestBody": { "$ref": "#/components/requestBodies/SavePut" },
        "responses": { "200": { "$ref": "#/components/responses/Mutation" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "delete": {
        "tags": ["Saves"], "operationId": "deleteMySave", "summary": "Idempotently remove a saved place or course",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "natural_resource" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/TargetType" }, { "$ref": "#/components/parameters/TargetId" }],
        "responses": { "200": { "$ref": "#/components/responses/Mutation" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/courses": {
      "get": {
        "tags": ["Courses"], "operationId": "listMyCourses", "summary": "List owned courses",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "cursor", "stableSort": ["updated_at:desc", "id:desc"] }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/Limit" }, { "$ref": "#/components/parameters/Cursor" }],
        "responses": { "200": { "$ref": "#/components/responses/CourseList" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "post": {
        "tags": ["Courses"], "operationId": "createCourse", "summary": "Create an owned course",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "header_required" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/IdempotencyKey" }], "requestBody": { "$ref": "#/components/requestBodies/CourseCreate" },
        "responses": { "201": { "$ref": "#/components/responses/Course" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "409": { "$ref": "#/components/responses/Conflict" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/courses/{id}/places": {
      "post": {
        "tags": ["Courses"], "operationId": "addCoursePlace", "summary": "Append a place to an owned course",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "header_required" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }, { "$ref": "#/components/parameters/IdempotencyKey" }], "requestBody": { "$ref": "#/components/requestBodies/CoursePlaceCreate" },
        "responses": { "201": { "$ref": "#/components/responses/Course" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "409": { "$ref": "#/components/responses/Conflict" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
    },
    "/courses/{id}/places/{coursePlaceId}": {
      "patch": {
        "tags": ["Courses"], "operationId": "updateCoursePlace", "summary": "Update course-place visit metadata",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "none" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }, { "$ref": "#/components/parameters/CoursePlaceId" }], "requestBody": { "$ref": "#/components/requestBodies/CoursePlaceUpdate" },
        "responses": { "200": { "$ref": "#/components/responses/Course" }, "400": { "$ref": "#/components/responses/BadRequest" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "409": { "$ref": "#/components/responses/Conflict" }, "500": { "$ref": "#/components/responses/InternalError" } }
      },
      "delete": {
        "tags": ["Courses"], "operationId": "deleteCoursePlace", "summary": "Remove a place from an owned course",
        "x-auth-class": "user", "x-operator-scope": "none", "x-idempotency": { "mode": "natural_resource" }, "x-pagination": { "mode": "none" }, "security": [{ "userBearer": [] }],
        "parameters": [{ "$ref": "#/components/parameters/UuidId" }, { "$ref": "#/components/parameters/CoursePlaceId" }],
        "responses": { "200": { "$ref": "#/components/responses/Course" }, "401": { "$ref": "#/components/responses/Unauthorized" }, "404": { "$ref": "#/components/responses/NotFound" }, "409": { "$ref": "#/components/responses/Conflict" }, "422": { "$ref": "#/components/responses/Unprocessable" }, "500": { "$ref": "#/components/responses/InternalError" } }
      }
